services:
  - type: web
    name: happiness-store
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: happiness2024
      - key: DATABASE_URL
        fromDatabase:
          name: happiness-db
          property: connectionString

databases:
  - name: happiness-db
    databaseName: happiness_store
    plan: free
